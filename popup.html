<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>YT Image Downloader</title>
    <style>
      body {
        width: 340px;
        margin: 0;
        padding: 14px;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 13px;
        color: #212121;
      }

      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }

      #status {
        color: #555;
        margin-bottom: 12px;
        line-height: 1.4;
      }

      #list {
        margin: 0 0 12px;
        padding: 0;
        list-style: none;
      }

      .card {
        padding: 10px 0;
        border-bottom: 1px solid #eee;
      }

      .card:last-child {
        border-bottom: none;
      }

      .card-title {
        font-weight: 600;
        margin-bottom: 8px;
      }

      .preview {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 8px;
      }

      .preview.banner,
      .preview.thumbnail {
        height: 90px;
      }

      .preview.avatar {
        width: 72px;
        height: 72px;
        margin: 0 auto 8px;
      }

      .preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .preview.avatar img {
        border-radius: 50%;
      }

      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .formats {
        display: flex;
        gap: 4px;
        flex: 1;
      }

      .format-btn {
        flex: 1;
        background: #f0f0f0;
        color: #444;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 6px 0;
        cursor: pointer;
        font-size: 11px;
      }

      .format-btn.active {
        background: #ff0000;
        border-color: #ff0000;
        color: #fff;
      }

      .download-btn {
        background: #ff0000;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 12px;
        white-space: nowrap;
      }

      .download-btn:hover {
        background: #cc0000;
      }

      .download-btn:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      #rescan {
        background: #ff0000;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 8px 14px;
        cursor: pointer;
        width: 100%;
        font-size: 13px;
      }

      #rescan:hover {
        background: #cc0000;
      }

      #rescan:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      .empty {
        color: #888;
      }

      #hint {
        color: #888;
        font-size: 11px;
        margin: 10px 0 0;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>YT Image Downloader</h1>
    <p id="status">Cargando...</p>
    <ul id="list"></ul>
    <button id="rescan" type="button">Reescanear pagina</button>
    <p id="hint">
      Vista previa y descarga en PNG o JPG. Si no detecta imagenes, recarga YouTube (F5).
    </p>
    <script src="popup.js"></script>
  </body>
</html>
